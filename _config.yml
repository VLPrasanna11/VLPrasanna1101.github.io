  Hi, I’m Lakshmi Prasanna Varanasi, a Business Analyst with experience in retail analytics and data-driven decision making.

  I have worked closely with fashion and FMCG brands to improve inventory efficiency, optimize stock movement, and drive revenue growth through structured problem-solving and analytics.

  Beyond work, I am deeply passionate about music. As a trained Carnatic classical singer with over 10 years of experience, I have performed in 200+ stage events across India.

  I am currently preparing to transition into management through an MBA.

